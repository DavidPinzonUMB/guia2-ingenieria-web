<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotos - Rennier</title>
    <style>
        /* ========================================================= */
        /* CSS basado en selectores de tipo y pseudo-clases     */
        /* ========================================================= */

        body {
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f7fa;
            color: #2b3036;
            line-height: 1.6;
        }

        main {
            max-width: 800px;
            margin: 40px auto;
            background: #ffffff;
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        header {
            border-bottom: 2px solid #eaebed;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h1 {
            color: #4a90e2;
            font-size: 2.5rem;
            margin: 0;
            font-weight: 800;
        }

        p {
            font-size: 1.1rem;
            color: #5a626e;
            margin-bottom: 20px;
        }

        /* --------------------------------- */
        /* GALERÍA REQUERIDA MODO HOVER      */
        /* --------------------------------- */
        section {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            justify-content: space-around;
            flex-wrap: wrap;
            /* Para móviles */
        }

        img {
            width: 220px;
            height: 220px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* Pseudo-clase obligatoria de la asignación */
        img:hover {
            transform: scale(1.15) translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            z-index: 10;
            position: relative;
        }

        /* Botón de volver */
        a {
            display: inline-block;
            margin-top: 40px;
            text-decoration: none;
            background-color: #f1f3f5;
            color: #4a90e2;
            font-weight: bold;
            padding: 12px 25px;
            border-radius: 8px;
            transition: all 0.3s ease;
            text-align: center;
            width: 100%;
        }

        a:hover {
            background-color: #4a90e2;
            color: #ffffff;
            transform: scale(1.02);
            box-shadow: 0 8px 15px rgba(74, 144, 226, 0.2);
        }
    </style>
</head>

<body>

    <main>
        <header>
            <h1>Galería de Interacciones</h1>
            <p>Pasa el cursor sobre cualquiera de las tres imágenes para visualizar la ampliación sin afectar la
                estructura usando <code>scale()</code> y la pseudo-clase <code>:hover</code>.</p>
        </header>

        <article>
            <section>
                <img src="https://images.unsplash.com/photo-1555066931-4365d14bab8c?crop=entropy&cs=srgb&fm=jpg&ixid=M3wzMjM4NDZ8MHwxfHJhbmRvbXx8fHx8fHx8fDE3MTI5ODgzNjh8&ixlib=rb-4.0.3&q=85"
                    alt="Código abstract">
                <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?crop=entropy&cs=srgb&fm=jpg&ixid=M3wzMjM4NDZ8MHwxfHJhbmRvbXx8fHx8fHx8fDE3MTI5ODg0MjV8&ixlib=rb-4.0.3&q=85"
                    alt="Laptop developer">
                <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?crop=entropy&cs=srgb&fm=jpg&ixid=M3wzMjM4NDZ8MHwxfHJhbmRvbXx8fHx8fHx8fDE3MTI5ODg0NTN8&ixlib=rb-4.0.3&q=85"
                    alt="Setup programador">
            </section>
        </article>

        <a href="../index.html">← Regresar a página inicial</a>
    </main>

</body>

</html>
